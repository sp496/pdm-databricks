new_cluster: &default_cluster
  spark_version: 14.3.x-scala2.12
  node_type_id: Standard_DS3_v2
  num_workers: 2
  spark_env_vars:
    DATAENV: ${var.env}

processed_job: &processed_job
  name: clinical_inventory_processed_${var.env}
  tags:
    project: clinical_inventory_optimization
    env: ${var.env}
    stage: processed

  tasks:
    - task_key: demand_planning
      new_cluster:
        <<: *default_cluster
      notebook_task:
        notebook_path: src/notebooks/processed/demand_planning
        base_parameters:
          DATAENV: ${var.env}
      libraries:
        - whl: dist/clinical_inventory-*.whl
